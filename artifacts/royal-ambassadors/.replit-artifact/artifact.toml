kind = "mobile"
previewPath = "/"
title = "Royal Ambassadors"
version = "1.0.0"
id = "artifacts/royal-ambassadors"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19297

[services.development]
run = "pnpm --filter @workspace/royal-ambassadors run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royal-ambassadors", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/royal-ambassadors", "run", "serve" ]

[services.env]
PORT = "19297"
BASE_PATH = "/"
